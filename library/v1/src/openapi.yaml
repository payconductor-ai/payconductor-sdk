              type: number
              examples:
                - 2030
              maximum: 2046
              minimum: 2025
          required:
            - month
            - year
          title: Expiration
        holderName:
          description: Card holder name
          type: string
          examples:
            - JOHN DOE
        number:
          description: Credit card number
          type: string
          examples:
            - '4242424242424242'
      required:
        - cvv
        - expiration
        - holderName
        - number
      title: Card Create Request
    Internal3DSAuthentication:
      description: 3DS authentication data managed by the platform
      type: object
      properties:
        type:
          type: string
          const: internal
        authToken:
          description: 3DS authentication token generated by the 3DS authentication
          type: string
        dsTransactionId:
          description: Directory server transaction identifier generated by the authentication provider
          type: string
        providerTransactionId:
          description: 3DS transaction identifier generated by the payment service provider
          type: string
        browser:
          description: Client browser information
          type: object
          properties:
            ip:
              description: Client IP address
              type: string
            userAgent:
              description: Browser user agent
              type: string
            acceptHeader:
              description: Browser Accept header
              type: string
            language:
              description: Browser language
              type: string
            colorDepth:
              description: Screen color depth
              type: integer
            screenHeight:
              description: Screen height in pixels
              type: integer
            screenWidth:
              description: Screen width in pixels
              type: integer
            timeZoneOffset:
              description: Time zone offset
              type: string
            javaEnabled:
              description: Indicates whether Java is enabled
              type: boolean
            javaScriptEnabled:
              description: Indicates whether JavaScript is enabled
              type: boolean
          required:
            - javaEnabled
            - javaScriptEnabled
          title: Browser Information
      required:
        - type
      title: Internal 3DS Authentication
    External3DSAuthentication:
      description: 3DS authentication data performed externally by the client
      type: object
      properties:
        type:
          type: string
          const: external
        status:
          description: 3DS authentication status performed by the client
          type: string
        eci:
          description: 'Authentication transaction identifier. In 3DS2, it may be the same value as CAVV. Used for authentication traceability'
          type: string
        version:
          description: 3DS protocol version used in the authentication
          type: string
          examples:
            - 2.2.0
        cavv:
          description: Code generated by the card issuer that proves the validation was completed
          type: string
        providerTransactionId:
          description: 3DS transaction identifier generated by the authentication provider
          type: string
        directoryTransactionId:
          description: Transaction identifier in the 3DS authentication directory
          type: string
        browser:
          description: Client browser information
          type: object
          properties:
            ip:
              description: Client IP address
              type: string
            userAgent:
              description: Browser user agent
              type: string
            acceptHeader:
              description: Browser Accept header
              type: string
            language:
              description: Browser language
              type: string
            colorDepth:
              description: Screen color depth
              type: integer
            screenHeight:
              description: Screen height in pixels
              type: integer
            screenWidth:
              description: Screen width in pixels
              type: integer
            timeZoneOffset:
              description: Time zone offset
              type: string
            javaEnabled:
              description: Indicates whether Java is enabled
              type: boolean
            javaScriptEnabled:
              description: Indicates whether JavaScript is enabled
              type: boolean
          required:
            - javaEnabled
            - javaScriptEnabled
          title: Browser Information
      required:
        - type
        - status
        - eci
        - version
        - cavv
        - providerTransactionId
        - directoryTransactionId
      title: External 3DS Authentication
    OrderPIXPaymentRequest:
      description: Specific data for PIX payment
      type: object
      properties:
        paymentMethod:
          type: string
          const: Pix
        expirationInSeconds:
          description: PIX expiration time in seconds
          type: number
          default: 3600
          examples:
            - 3600
            - 86400
          minimum: 3600
          multipleOf: 1
      required:
        - paymentMethod
      title: Order PIX Payment Request
    OrderCreditCardPaymentRequest:
      description: Specific data for credit card payment
      type: object
      properties:
        paymentMethod:
          type: string
          const: CreditCard
        card:
          oneOf:
            - $ref: '#/components/schemas/OrderTokenizedCardData'
            - $ref: '#/components/schemas/CardCreateRequest'
        installments:
          description: Number of installments
          type: number
          default: 1
          maximum: 12
          minimum: 1
          multipleOf: 1
        softDescriptor:
          description: Text that will appear on the card statement (soft descriptor)
          type: string
          examples:
            - PEDRO*TESTE
          maxLength: 22
          minLength: 1
        threeDSecure:
          discriminator:
            propertyName: type
            mapping:
              internal: '#/components/schemas/Internal3DSAuthentication'
              external: '#/components/schemas/External3DSAuthentication'
          oneOf:
            - $ref: '#/components/schemas/Internal3DSAuthentication'
            - $ref: '#/components/schemas/External3DSAuthentication'
      required:
        - paymentMethod
        - card
        - installments
      title: Order Credit Card Payment Request
    OrderBankSlipPaymentRequest:
      description: Specific data for bank slip payment
      type: object
      properties:
        paymentMethod:
          type: string
          const: BankSlip
        expirationInDays:
          description: Days until bank slip expires
          type: number
          default: 7
          examples:
            - 3
            - 7
            - 15
          minimum: 1
          multipleOf: 1
      required:
        - paymentMethod
      title: Order Bank Slip Payment Request
    OrderNuPayPaymentRequest:
      description: Specific data for NuPay payment
      type: object
      properties:
        paymentMethod:
          type: string
          const: NuPay
        nuPay:
          description: Specific data for NuPay payment
          type: object
          properties:
            cancelUrl:
              description: Payment cancellation URL
              type: string
              examples:
                - 'https://example.com/cancel'
            merchantName:
              description: Merchant name
              type: string
              examples:
                - My Store
            returnUrl:
              description: Return URL after payment completion
              type: string
              examples:
                - 'https://example.com/success'
            storeName:
              description: Store name
              type: string
              examples:
                - Downtown Branch
          required:
            - cancelUrl
            - merchantName
            - returnUrl
      required:
        - paymentMethod
        - nuPay
      title: Order NuPay Payment Request
    OrderPicPayPaymentRequest:
      description: Specific data for PicPay payment
      type: object
      properties:
        paymentMethod:
          type: string
          const: PicPay
      required:
        - paymentMethod
      title: Order PicPay Payment Request
    OrderGooglePayPaymentRequest:
      description: Specific data for Google Pay payment (ECv2 Token)
      type: object
      properties:
        paymentMethod:
          type: string
          const: GooglePay
        googlePay:
          description: Specific data for Google Pay payment (ECv2 Token)
          type: object
          properties:
            signature:
              description: Signature of the Google Pay payment token
              type: string
            intermediateSigningKey:
              description: Google Pay intermediate signing key
              type: object
              properties:
                signedKey:
                  description: Encoded intermediate signing key
                  type: string
                signatures:
                  description: List of intermediate key signatures
                  type: array
                  items:
                    description: Signatures of the intermediate key
                    type: string
                  minItems: 1
              required:
                - signedKey
                - signatures
            protocolVersion:
              description: Encryption protocol version
              type: string
              examples:
                - ECv2
                - ECv2SigningOnly
            signedMessage:
              description: 'JSON serialized string by Google Pay containing encryptedMessage, ephemeralPublicKey and tag'
              type: string
          required:
            - signature
            - intermediateSigningKey
            - protocolVersion
            - signedMessage
        installments:
          description: Number of installments
          type: integer
          default: 1
          maximum: 12
          minimum: 1
      required:
        - paymentMethod
        - googlePay
      title: Order Google Pay Payment Request
    ApplePay:
      description: Payment with Apple Pay digital wallet
      type: object
      properties:
        paymentMethod:
          type: string
          const: ApplePay
        applePay:
          description: Apple Pay token data from the device
          type: object
          properties:
            version:
              description: Token version. The only accepted value is EC_v1
              type: string
              examples:
                - EC_v1
            data:
              description: Encrypted payment data from Apple Pay token
              type: string
            signature:
              description: Signature of the payment and header data
              type: string
            header:
              description: Additional header information for payment verification
              type: object
              properties:
                ephemeralPublicKey:
                  description: 'X.509 encoded key bytes, Base64 encoded'
                  type: string
                publicKeyHash:
                  description: Hash of the X.509 encoded public key bytes of the merchant certificate
                  type: string
                transactionId:
                  description: Hexadecimal transaction identifier
                  type: string
              required:
                - ephemeralPublicKey
                - publicKeyHash
                - transactionId
          required:
            - version
            - data
            - signature
            - header
        installments:
          description: Number of installments for the payment
          type: integer
          default: 1
          maximum: 12
          minimum: 1
      required:
        - paymentMethod
        - applePay
      title: Apple Pay
    OrderDraftPaymentRequest:
      description: Used to create an order without generating a real payment. Use to create orders that will be paid later
      type: object
      properties:
        paymentMethod:
          type: string
          const: Draft
        expirationInSeconds:
          description: Order expiration time in seconds
          type: number
          default: 3600
          examples:
            - 3600
            - 86400
          multipleOf: 1
        availablePaymentMethods:
          description: Available payment methods for this order
          type: array
          items:
            default: Pix
            type: string
            enum:
              - Pix
              - BankSlip
              - CreditCard
              - NuPay
              - PicPay
              - GooglePay
      required:
        - paymentMethod
      title: Order Draft Payment Request
    CustomerCreateRequest:
      description: Schema for creating a new customer
      type: object
      properties:
        address:
          description: Schema for creating a new address
          type: object
          properties:
            city:
              description: City name
              type: string
              examples:
                - São Paulo
                - Rio de Janeiro
            country:
              description: Country code in ISO 3166-1 alpha-2 format
              type: string
              default: BR
              examples:
                - BR
                - US
              maxLength: 2
              minLength: 2
            neighborhood:
              description: Neighborhood name
              type: string
              examples:
                - Downtown
                - Jardins
            number:
              description: Address number
              type: string
              examples:
                - '1000'
                - '150'
            state:
              description: State code in ISO 3166-2 format
              type: string
              examples:
                - SP
                - RJ
              maxLength: 2
              minLength: 2
            street:
              description: Street name
              type: string
              examples:
                - Av. Paulista
                - Rua das Flores
            zipCode:
              description: ZIP code without formatting
              type: string
              examples:
                - '01311200'
                - '20040002'
          required:
            - city
            - country
            - neighborhood
            - number
            - state
            - street
            - zipCode
          title: Address Create Request
        documentNumber:
          description: Customer CPF or CNPJ without formatting
          type: string
          examples:
            - '12345678909'
            - '12345678000195'
          pattern: '^\d{11}$|^\d{14}$'
        documentType:
          $ref: '#/components/schemas/DocumentType'
        email:
          description: Customer email
          type: string
          format: email
          examples:
            - customer@example.com
        name:
          description: Customer full name
          type: string
          examples:
            - John Doe
        phoneNumber:
          description: Customer phone number in +55 DD 9XXXXXXXX format
          type: string
          error: 'Invalid phone number format. Expected format: +55 DD 9XXXXXXXX'
          examples:
            - +55 11 987654321
          pattern: '^\+(\d{1,2}) (\d{2}) (\d{8,9})$'
      required:
        - documentNumber
        - documentType
        - email
        - name
      title: Customer Create Request
    CardTokenizationCustomerByIdData:
      description: Reference to an existing customer by ID
      type: object
      properties:
        id:
          description: ID of an existing customer
          type: string
          examples:
            - cmjizheco00002v6o7q72knwb
      required:
        - id
      title: Card Tokenization Customer By Id Data
  securitySchemes:
    basicAuth:
      description: 'Use the format Authorization: Basic base64(''client_id:client_secret'')'
      scheme: basic
      type: http
tags:
  - description: 'Manage charges, check order status, and handle refunds.'
    name: Order
  - description: Initiate and monitor withdrawals and transfers to your external accounts.
    name: Withdraw
  - description: 'Manage customers, create, update, delete and list customers.'
    name: Customer
  - description: Tokenize credit cards for future charges.
    name: Card Tokenization
security:
  - basicAuth: []
webhooks:
  Order Update:
    post:
      requestBody:
        description: Triggered when the status of an order is changed.
        content:
          application/json:
            schema:
              description: Webhook event payload for order status changes
              type: object
              properties:
                event:
                  $ref: '#/components/schemas/Event'
                payload:
                  description: Response after creating an order
                  type: object
                  noValidate: true
                  properties:
                    id:
                      description: Order ID in the system
                      type: string
                      examples:
                        - ord_abc123
                    externalId:
                      anyOf:
                        - description: External order ID (provided by your integration)
                          examples:
                            - order_123
                          type: string
                        - type: 'null'
                    idempotencyKey:
                      anyOf:
                        - description: Order idempotency key
                          examples:
                            - unique-key-123
                          type: string
                        - type: 'null'
                    externalIntegrationKey:
                      description: Provider used to process the order
                      type: string
                      examples:
                        - PagarMe
                        - Stripe
                    externalIntegrationId:
                      anyOf:
                        - description: Order ID in the payment provider
                          examples:
                            - order_123
                          type: string
                        - type: 'null'
                    amount:
                      description: Total order amount
                      type: number
                      examples:
                        - 150.45
                    costFee:
                      description: Cost fee applied to the order
                      type: number
                      examples:
                        - 4.5
                    pix:
                      description: PIX payment data and QR code information
                      type: object
                      properties:
                        copyAndPasteCode:
                          description: PIX copy and paste code
                          type: string
                          examples:
                            - 00020126580014br.gov.bcb.pix...
                        qrCodeUrl:
                          description: PIX QR Code image URL
                          type: string
                          examples:
                            - 'https://example.com/qrcode.png'
                        endToEndId:
                          anyOf:
                            - description: PIX E2E ID
                              examples:
                                - E2EID1234567890
                              type: string
                            - type: 'null'
                          nullable: true
                      required:
                        - copyAndPasteCode
                        - qrCodeUrl
                        - endToEndId
                      title: Order PIX Info
                    bankSlip:
                      description: Bank slip payment data
                      type: object
                      properties:
                        barCode:
                          description: Bank slip bar code
                          type: string
                          examples:
                            - '34191790010104351004791020150008291070026000'
                        digitableLine:
                          description: Bank slip digitable line
                          type: string
                          examples:
                            - 34191.79001 01043.510047 91020.150008 2 91070026000
                        pdfUrl:
                          description: Bank slip PDF URL
                          type: string
                          examples:
                            - 'https://example.com/boleto.pdf'
                      required:
                        - barCode
                        - digitableLine
                      title: Order Bank Slip Info
                    nuPay:
                      description: NuPay payment data
                      type: object
                      properties:
                        paymentUrl:
                          description: NuPay payment URL
                          type: string
                          examples:
                            - 'https://nupay.com.br/payment/123456'
                      required:
                        - paymentUrl
                      title: Order NuPay Info
                    picPay:
                      description: PicPay payment data
                      type: object
                      properties:
                        copyAndPasteCode:
                          description: PicPay copy and paste code
                          type: string
                          examples:
                            - picpay.me/store/abc123
                        qrCodeUrl:
                          description: PicPay QR Code image URL
                          type: string
                          examples:
                            - 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAA...'
                      required:
                        - copyAndPasteCode
                        - qrCodeUrl
                      title: Order PicPay Info
                    creditCard:
                      description: Credit card payment data
                      type: object
                      properties:
                        authorizationCode:
                          description: Transaction authorization code
                          type: string
                          examples:
                            - '123456'
                      title: Order Credit Card Info
                    status:
                      $ref: '#/components/schemas/Status'
                    paymentMethod:
                      $ref: '#/components/schemas/PaymentMethod'
                    payedAt:
                      anyOf:
                        - description: Date and time when the order was paid (ISO 8601)
                          examples:
                            - '2024-01-01T12:00:00Z'
                          type: string
                        - type: 'null'
                    errorCode:
                      anyOf:
                        - description: 'Error code, if any'
                          examples:
                            - INSUFFICIENT_FUNDS
                          type: string
                        - type: 'null'
                    errorMessage:
                      anyOf:
                        - description: 'Error message, if any'
                          examples:
                            - Insufficient funds
                          type: string
                        - type: 'null'
                    orderItems:
                      description: List of products or services included in the order
                      type: array
                      items:
                        type: object
                        properties:
                          externalId:
                            anyOf:
                              - description: External item ID
                                examples:
                                  - prod_123
                                type: string
                              - type: 'null'
                          id:
                            description: Item ID in the order
                            type: string
                            examples:
                              - item_abc123
                          name:
                            description: Product/service name
                            type: string
                            examples:
                              - Polo Shirt
                          qty:
                            description: Quantity
                            type: number
                            examples:
                              - 2
                          totalAmount:
                            description: Total item amount (quantity × unit price)
                            type: number
                            examples:
                              - 200
                          totalNetAmount:
                            description: Total net amount of the item
                            type: number
                            examples:
                              - 180
                          unityPrice:
                            description: Unit price
                            type: number
                            examples:
                              - 100
                        required:
                          - externalId
                          - id
                          - name
                          - qty
                          - totalAmount
                          - totalNetAmount
                          - unityPrice
                      title: Order Items
                    session:
                      anyOf:
                        - type: object
                          properties:
                            sessionId:
                              description: ID of the checkout session associated with the order
                              type: string
                          required:
                            - sessionId
                        - type: 'null'
                      nullable: true
                    threeDSecure:
                      type: object
                      properties:
                        authToken:
                          description: '3DS authentication token, returned only when internal 3DS authentication needs to be performed'
                          type: string
                          examples:
                            - BwABBylVaQAAAAFwllVpAAAAAAA=
                        threeDsUrl:
                          description: 'URL to execute the 3DS challenge, returned only for internal 3DS authentications'
                          type: string
                          examples:
                            - 'https://www.mercadopago.com.ar/auth/card/validation/pages/remedies/019ada0a-fe1f-7a82-ba1a-1ccb4e0232e7?display_mode=self_hosted&guest_token=0661345a-e0e1-4c09-aff9-b7929ca9a24a'
                        dsTransactionId:
                          description: Directory server transaction identifier generated by the authentication provider
                          type: string
                        version:
                          description: 3DS protocol version used in the authentication
                          type: string
                        status:
                          $ref: '#/components/schemas/Status'
                        acquirer:
                          $ref: '#/components/schemas/Acquirer'
                      required:
                        - status
                  required:
                    - id
                    - externalId
                    - idempotencyKey
                    - externalIntegrationKey
                    - externalIntegrationId
                    - amount
                    - costFee
                    - status
                    - paymentMethod
                    - payedAt
                    - errorCode
                    - errorMessage
                    - orderItems
                  title: Order Create Response
              required:
                - event
                - payload
              title: Order Webhook Event
  Withdraw Update:
    post:
      requestBody:
        description: Triggered when the status of a withdrawal is changed.
        content:
          application/json:
            schema:
              description: Webhook event payload for withdrawal status changes
              type: object
              properties:
                event:
                  $ref: '#/components/schemas/Event'
                payload:
                  description: Response after creating a withdrawal or transfer
                  type: object
                  noValidate: true
                  properties:
                    id:
                      description: Unique withdrawal identifier
                      type: string
                      examples:
                        - wd_1234567890
                    idempotencyKey:
                      anyOf:
                        - description: Withdrawal idempotency key
                          examples:
                            - unique-withdraw-key-123
                          type: string
                        - type: 'null'
                    externalId:
                      anyOf:
                        - description: Withdrawal ID in your system
                          examples:
                            - external_withdraw_123
                          type: string
                        - type: 'null'
                      nullable: true
                    externalIntegrationKey:
                      description: Provider key used for the withdrawal
                      type: string
                      examples:
                        - PagarMe
                        - Asaas
                    externalIntegrationId:
                      anyOf:
                        - description: Withdrawal ID in the payment provider
                          examples:
                            - withdraw_123
                          type: string
                        - type: 'null'
                    costFee:
                      description: Cost fee applied to the withdrawal
                      type: number
                      examples:
                        - 4.5
                    status:
                      $ref: '#/components/schemas/Status'
                    errorCode:
                      anyOf:
                        - description: 'Error code, if any'
                          examples:
                            - insufficient_funds
                            - invalid_account
                          type: string
                        - type: 'null'
                    errorMessage:
                      anyOf:
                        - type: 'null'
                        - description: 'Descriptive error message, if any'
                          examples:
                            - Insufficient balance to complete withdrawal
                            - Invalid bank account
                          type: string
                    payedAt:
                      anyOf:
                        - type: 'null'
                        - description: Date and time when the withdrawal was paid (ISO 8601 format)
                          examples:
                            - '2024-01-01T12:00:00Z'
                          anyOf:
                            - description: Date and time when the withdrawal was paid (ISO 8601 format)
                              examples:
                                - '2024-01-01T12:00:00Z'
                              type: Date
                            - format: date-time
                              type: string
                            - format: date
                              type: string
                            - type: number
                    payoutAccount:
                      type: object
                      properties:
                        id:
                          description: Unique payment account identifier
                          type: string
                          examples:
                            - pa_1234567890
                      required:
                        - id
                  required:
                    - id
                    - idempotencyKey
                    - externalId
                    - externalIntegrationKey
                    - externalIntegrationId
                    - costFee
                    - status
                    - errorCode
                    - errorMessage
                    - payedAt
                    - payoutAccount
                  title: Withdraw Create Response
              required:
                - event
                - payload
              title: Withdraw Webhook Response
  Merchant Update:
    post:
      requestBody:
        description: Triggered when the status of a merchant is changed.
        content:
          application/json:
            schema:
              description: Webhook event payload for merchant status changes
              type: object
              properties:
                event:
                  $ref: '#/components/schemas/Event'
                payload:
                  description: Modelo de resposta com todos os dados do merchant
                  type: object
                  noValidate: true
                  properties:
                    id:
                      description: ID único do merchant
                      type: string
                      examples:
                        - cm123abc456def
                    productsDescription:
                      anyOf:
                        - description: Descrição dos produtos ou serviços oferecidos
                          examples:
                            - Venda de roupas e acessórios
                            - Consultoria em TI
                          type: string
                        - type: 'null'
                      nullable: true
                    mcc:
                      anyOf:
                        - description: Merchant Category Code
                          examples:
                            - '5411'
                            - '5812'
                          type: string
                        - type: 'null'
                      nullable: true
                    website:
                      description: URL do site do merchant
                      type: string
                      format: url
                      examples:
                        - 'https://www.oldorder.com.br'
                    status:
                      $ref: '#/components/schemas/Status'
                    errorMessage:
                      anyOf:
                        - description: Mensagem de erro caso a criação da subconta tenha falhado
                          examples:
                            - Invalid API key
                            - 'Missing required field: bank_account'
                          type: string
                        - type: 'null'
                      nullable: true
                    bussiness:
                      type: object
                      properties:
                        name:
                          description: Razão social ou nome completo do merchant
                          type: string
                          examples:
                            - Old Order Tecnologia LTDA
                            - João da Silva
                        document:
                          description: CNPJ ou CPF do merchant
                          type: string
                          examples:
                            - '65800562000165'
                            - '51102616010'
                        email:
                          description: Email principal do merchant
                          type: string
                          format: email
                          examples:
                            - contato@oldorder.com.br
                        phoneNumber:
                          anyOf:
                            - description: Telefone de contato do merchant
                              examples:
                                - '31999887766'
                                - '11987654321'
                              type: string
                            - type: 'null'
                          nullable: true
                        tradeName:
                          anyOf:
                            - description: Nome fantasia do merchant
                              examples:
