              schema:
                description: Response after creating a withdrawal or transfer
                type: object
                properties:
                  id:
                    description: Unique withdrawal identifier
                    type: string
                    examples:
                      - wd_1234567890
                  idempotencyKey:
                    anyOf:
                      - description: Withdrawal idempotency key
                        examples:
                          - unique-withdraw-key-123
                        type: string
                      - type: 'null'
                  externalId:
                    anyOf:
                      - description: Withdrawal ID in your system
                        examples:
                          - external_withdraw_123
                        type: string
                      - type: 'null'
                    nullable: true
                  externalIntegrationKey:
                    description: Provider key used for the withdrawal
                    type: string
                    examples:
                      - PagarMe
                      - Asaas
                  externalIntegrationId:
                    anyOf:
                      - description: Withdrawal ID in the payment provider
                        examples:
                          - withdraw_123
                        type: string
                      - type: 'null'
                  costFee:
                    description: Cost fee applied to the withdrawal
                    type: number
                    examples:
                      - 4.5
                  status:
                    $ref: '#/components/schemas/Status'
                  errorCode:
                    anyOf:
                      - description: 'Error code, if any'
                        examples:
