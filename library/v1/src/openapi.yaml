  /card-tokenization/:
    post:
      operationId: cardTokenize
      summary: Tokenize Card
      description: Tokenize credit cards for future charges.
      requestBody:
        description: Data for creating a customer card with customer information
        required: true
        content:
          application/json:
            schema:
              description: Data for creating a customer card with customer information
              type: object
              properties:
                card:
                  description: Complete card data for payment processing
                  type: object
                  properties:
                    cvv:
                      description: Card security code (CVV)
                      type: string
                      examples:
                        - '123'
                        - '1234'
                      maxLength: 4
                      minLength: 3
                    expiration:
                      description: Card expiration date
                      type: object
                      properties:
                        month:
                          description: Card expiration month
                          type: number
                          examples:
                            - 1
                            - 12
                          maximum: 12
                          minimum: 1
                        year:
                          description: Card expiration year
                          type: number
                          examples:
                            - 2030
                          maximum: 2046
                          minimum: 2025
                      required:
                        - month
                        - year
                      title: Expiration
                    holderName:
                      description: Card holder name
                      type: string
                      examples:
                        - JOHN DOE
                    number:
                      description: Credit card number
                      type: string
                      examples:
                        - '4242424242424242'
                  required:
                    - cvv
                    - expiration
                    - holderName
                    - number
                  title: Card Create Request
                saveCard:
                  description: Indicates if the card should be saved for future use
                  type: boolean
                  examples:
                    - true
                    - false
                customer:
                  oneOf:
                    - $ref: '#/components/schemas/CustomerCreateRequest'
                    - $ref: '#/components/schemas/CardTokenizationCustomerByIdData'
              required:
                - card
                - saveCard
                - customer
              title: Card Tokenization Create Request
      responses:
        '200':
          description: Response containing customer ID and card token
          content:
            application/json:
              schema:
                description: Response containing customer ID and card token
                type: object
                properties:
                  customerId:
                    description: ID of the customer associated with the created card
                    type: string
                    examples:
                      - cmjizheco00002v6o7q72knwb
                  token:
                    description: Token of the created card for future transactions
                    type: string
                    examples:
                      - card_019b4cb6-bc0b-730b-81e2-5a9eaa22975a
                noValidate: true
                required:
                  - customerId
                  - token
                title: Card Tokenization Create Response
      tags:
        - Card Tokenization
