  /customers/:
    get:
      operationId: customerListCustom
      summary: Get All Customers
      description: 'Retrieve a list of all customers associated with the organization, with support for filters and pagination.'
      parameters:
        - name: email
          in: query
          required: false
          schema:
            description: Filter by customer email
            type: string
            format: email
        - name: name
          in: query
          required: false
          schema:
            description: Filter by customer name
            type: string
            maxLength: 255
            minLength: 1
        - name: page
          in: query
          required: true
          schema:
            description: Page number
            type: number
            default: 1
            examples:
              - 1
              - 2
              - 3
            minimum: 1
            multipleOf: 1
        - name: pageSize
          in: query
          required: true
          schema:
            description: Number of items per page
            type: number
            default: 20
            examples:
              - 10
              - 20
              - 50
            maximum: 100
            minimum: 1
            multipleOf: 1
        - name: endDate
          in: query
          required: false
          schema:
            description: 'End date for custom filter (YYYY-MM-DDTHH:MM:SSZ format)'
            type: string
            format: date-time
            examples:
              - '2025-01-15T03:00:00Z'
        - name: startDate
          in: query
          required: false
          schema:
            description: 'Start date for custom filter (YYYY-MM-DDTHH:MM:SSZ format)'
            type: string
            format: date-time
            examples:
              - '2025-01-01T03:00:00Z'
      responses:
        '200':
          description: Paginated list of customers
          content:
            application/json:
              schema:
                description: Paginated list of customers
                type: object
                properties:
                  data:
                    description: List of customers
                    type: array
                    items:
                      title: Customer Read Response
                      description: Customer response with complete information
                      type: object
                      properties:
                        id:
                          description: Unique customer identifier
                          type: string
                          examples:
                            - cust_1234567890
                        name:
                          description: Customer full name
                          type: string
                          examples:
                            - John Doe
                        email:
                          description: Customer email
                          type: string
                          format: email
                          examples:
                            - customer@example.com
                        documentType:
                          $ref: '#/components/schemas/DocumentType'
                        documentNumber:
                          description: Customer document number (CPF or CNPJ)
                          anyOf:
                            - description: Customer document number (CPF or CNPJ)
                              examples:
                                - '12345678909'
                                - '12345678000195'
                              type: string
                            - type: 'null'
                        phoneNumber:
                          description: Customer phone number
                          anyOf:
                            - description: Customer phone number
