                      description: Checkout session ID generated by the client side. The ID must be unique for each cart session
                      type: string
                      minLength: 16
                shippingFee:
                  description: Shipping fee
                  type: number
                  default: 0
                taxFee:
                  description: Additional fees
                  type: number
                  default: 0
                metadata:
                  description: Additional metadata for the order as key-value pairs. Keys should not contain spaces or special characters
                  type: object
                  patternProperties:
                    ^(.*)$:
                      description: Metadata value
                      examples:
                        - merchant@gmail.com
                      type: string
                  title: Order Metadata
                routing:
                  description: Routing data to define specific integrations to process the order
                  type: object
                  properties:
                    directIntegrationId:
                      description: 'ID of a specific integration to process the order. Used to force the order to be processed by a specific integration, bypassing the default routing configuration'
                      type: string
                      examples:
                        - integration_123
                  title: Order Routing Data
              noValidate: true
              required:
                - chargeAmount
                - clientIp
                - customer
                - discountAmount
                - externalId
                - payment
                - shippingFee
                - taxFee
              title: Order Create Request
      responses:
        '200':
          description: Response after creating an order
          content:
            application/json:
              schema:
                description: Response after creating an order
                type: object
                properties:
                  id:
                    description: Order ID in the system
                    type: string
                    examples:
                      - ord_abc123
                  externalId:
                    anyOf:
                      - description: External order ID (provided by your integration)
                        examples:
                          - order_123
                        type: string
                      - type: 'null'
                  idempotencyKey:
                    anyOf:
                      - description: Order idempotency key
                        examples:
                          - unique-key-123
                        type: string
                      - type: 'null'
                  externalIntegrationKey:
                    description: Provider used to process the order
                    type: string
                    examples:
                      - PagarMe
                      - Stripe
                  externalIntegrationId:
                    anyOf:
                      - description: Order ID in the payment provider
                        examples:
                          - order_123
                        type: string
                      - type: 'null'
                  amount:
                    description: Total order amount
                    type: number
                    examples:
                      - 150.45
                  costFee:
                    description: Cost fee applied to the order
                    type: number
                    examples:
                      - 4.5
                  pix:
                    description: PIX payment data and QR code information
                    type: object
                    properties:
                      copyAndPasteCode:
                        description: PIX copy and paste code
                        type: string
                        examples:
                          - 00020126580014br.gov.bcb.pix...
                      qrCodeUrl:
                        description: PIX QR Code image URL
                        type: string
                        examples:
                          - 'https://example.com/qrcode.png'
                      endToEndId:
                        anyOf:
                          - description: PIX E2E ID
                            examples:
                              - E2EID1234567890
                            type: string
                          - type: 'null'
                        nullable: true
                    required:
                      - copyAndPasteCode
                      - qrCodeUrl
                      - endToEndId
                    title: Order PIX Info
                  bankSlip:
                    description: Bank slip payment data
                    type: object
                    properties:
                      barCode:
                        description: Bank slip bar code
                        type: string
                        examples:
                          - '34191790010104351004791020150008291070026000'
                      digitableLine:
                        description: Bank slip digitable line
                        type: string
                        examples:
                          - 34191.79001 01043.510047 91020.150008 2 91070026000
                      pdfUrl:
                        description: Bank slip PDF URL
                        type: string
                        examples:
                          - 'https://example.com/boleto.pdf'
                    required:
                      - barCode
                      - digitableLine
                    title: Order Bank Slip Info
                  nuPay:
                    description: NuPay payment data
                    type: object
                    properties:
                      paymentUrl:
                        description: NuPay payment URL
                        type: string
                        examples:
                          - 'https://nupay.com.br/payment/123456'
                    required:
                      - paymentUrl
                    title: Order NuPay Info
                  picPay:
                    description: PicPay payment data
                    type: object
                    properties:
                      copyAndPasteCode:
                        description: PicPay copy and paste code
                        type: string
                        examples:
                          - picpay.me/store/abc123
                      qrCodeUrl:
                        description: PicPay QR Code image URL
                        type: string
                        examples:
                          - 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAA...'
                    required:
                      - copyAndPasteCode
                      - qrCodeUrl
                    title: Order PicPay Info
                  creditCard:
                    description: Credit card payment data
                    type: object
                    properties:
                      authorizationCode:
                        description: Transaction authorization code
                        type: string
                        examples:
                          - '123456'
                    title: Order Credit Card Info
                  status:
                    $ref: '#/components/schemas/Status'
                  paymentMethod:
                    $ref: '#/components/schemas/PaymentMethod'
                  payedAt:
                    anyOf:
                      - description: Date and time when the order was paid (ISO 8601)
                        examples:
                          - '2024-01-01T12:00:00Z'
                        type: string
                      - type: 'null'
                  errorCode:
                    anyOf:
                      - description: 'Error code, if any'
                        examples:
                          - INSUFFICIENT_FUNDS
                        type: string
                      - type: 'null'
                  errorMessage:
                    anyOf:
                      - description: 'Error message, if any'
                        examples:
                          - Insufficient funds
                        type: string
                      - type: 'null'
                  orderItems:
                    description: List of products or services included in the order
                    type: array
                    items:
                      type: object
                      properties:
                        externalId:
                          anyOf:
                            - description: External item ID
                              examples:
                                - prod_123
                              type: string
                            - type: 'null'
                        id:
                          description: Item ID in the order
                          type: string
                          examples:
                            - item_abc123
                        name:
                          description: Product/service name
                          type: string
                          examples:
                            - Polo Shirt
                        qty:
                          description: Quantity
                          type: number
                          examples:
                            - 2
                        totalAmount:
                          description: Total item amount (quantity × unit price)
                          type: number
                          examples:
                            - 200
                        totalNetAmount:
                          description: Total net amount of the item
                          type: number
                          examples:
                            - 180
                        unityPrice:
                          description: Unit price
                          type: number
                          examples:
                            - 100
                      required:
                        - externalId
                        - id
                        - name
                        - qty
                        - totalAmount
                        - totalNetAmount
                        - unityPrice
                    title: Order Items
                  session:
                    anyOf:
                      - type: object
                        properties:
                          sessionId:
                            description: ID of the checkout session associated with the order
                            type: string
                        required:
                          - sessionId
                      - type: 'null'
                    nullable: true
                  threeDSecure:
                    type: object
                    properties:
                      authToken:
                        description: '3DS authentication token, returned only when internal 3DS authentication needs to be performed'
                        type: string
                        examples:
                          - BwABBylVaQAAAAFwllVpAAAAAAA=
                      threeDsUrl:
                        description: 'URL to execute the 3DS challenge, returned only for internal 3DS authentications'
                        type: string
                        examples:
                          - 'https://www.mercadopago.com.ar/auth/card/validation/pages/remedies/019ada0a-fe1f-7a82-ba1a-1ccb4e0232e7?display_mode=self_hosted&guest_token=0661345a-e0e1-4c09-aff9-b7929ca9a24a'
                      dsTransactionId:
                        description: Directory server transaction identifier generated by the authentication provider
                        type: string
                      version:
                        description: 3DS protocol version used in the authentication
                        type: string
                      status:
                        $ref: '#/components/schemas/Status'
                      acquirer:
                        $ref: '#/components/schemas/Acquirer'
                    required:
                      - status
                noValidate: true
                required:
                  - id
                  - externalId
                  - idempotencyKey
                  - externalIntegrationKey
                  - externalIntegrationId
                  - amount
                  - costFee
                  - status
                  - paymentMethod
                  - payedAt
                  - errorCode
                  - errorMessage
                  - orderItems
                title: Order Create Response
      tags:
        - Order
